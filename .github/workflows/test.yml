name: Tests

# Runs the full pytest suite on every push to main and on every PR that
# touches code or test files. The path filters keep workflows free for
# README-only / docs-only changes.

on:
  push:
    branches: [main, master]
    paths:
      - "custom_components/**"
      - "standalone_homie-proxy/**"
      - "tests/**"
      - "pytest.ini"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "custom_components/**"
      - "standalone_homie-proxy/**"
      - "tests/**"
      - "pytest.ini"
      - ".github/workflows/test.yml"
  # Allow manual triggering for ad-hoc runs.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Test against the same Python versions HA itself supports. Bump as HA
        # bumps. 3.12 is current minimum for the latest HA cores.
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-aiohttp aiohttp

      - name: Run unit + integration + security tests
        # `-ra` shows the reasons for any skipped/xfailed tests so we don't
        # accidentally accumulate silent dead xfails over time.
        run: pytest tests/ -v -ra
        working-directory: .

      - name: Validate hacs.json
        run: |
          python -c "import json,sys; json.load(open('hacs.json')); print('hacs.json valid')"

      - name: Validate manifest.json
        run: |
          python -c "import json,sys; m=json.load(open('custom_components/homie_proxy/manifest.json')); assert m['domain']=='homie_proxy'; assert 'version' in m; print('manifest.json valid, version='+m['version'])"

      - name: Validate translations JSON
        run: |
          python -c "import json,glob; [json.load(open(f)) for f in glob.glob('custom_components/homie_proxy/translations/*.json')]; print('translations valid')"
